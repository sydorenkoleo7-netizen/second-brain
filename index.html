<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain - Obsidian Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>🧠 Second Brain</h2>
            <input type="text" id="search-bar" placeholder="Поиск заметок или тегов...">
            <button id="new-note-btn">+ Новая заметка</button>
            <ul id="notes-list"></ul>
        </aside>

        <main class="note-editor">
            <input type="text" id="note-title" placeholder="Название заметки..." disabled>
            <input type="text" id="note-tags" placeholder="Теги (через запятую, например: #работа, #идеи)..." disabled>
            <textarea id="note-content" placeholder="Начните писать здесь... Поддерживаются связи [[Название другой заметки]]" disabled></textarea>
            <div id="preview-area" class="hidden"></div>
            <div class="editor-actions">
                <button id="save-btn" disabled>Сохранить</button>
                <button id="toggle-preview-btn" disabled>Предпросмотр</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
